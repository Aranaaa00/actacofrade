<section class="login-overlay"
  role="dialog"
  aria-modal="true"
  aria-labelledby="login-heading"
  (click)="onOverlayClick($event)"
  (keydown.escape)="close()">

  <article class="login" #loginModal>
    <aside class="login__sidebar" aria-label="Identidad de ActaCofrade">
      <img class="login__logo" src="logo-sin-texto.png" alt="Escudo institucional de ActaCofrade" width="192" height="192">
      <h2 class="login__brand">ActaCofrade</h2>
      <p class="login__tagline">Gestión de actos y decisiones</p>
    </aside>

    <section class="login__main">
      <h1 class="login__heading" id="login-heading">Iniciar sesión</h1>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login__form" aria-label="Formulario de inicio de sesión">
        <app-form-field label="Correo electrónico" fieldId="login-email" [hasError]="hasError('email')" [errorMessage]="hasError('email') ? getError('email') : ''">
          <input id="login-email"
            #emailInput
            type="email"
            formControlName="email"
            placeholder="ejemplo@hermandad.es"
            autocomplete="email"
            maxlength="255"
            [appAutofocus]="focusEmail"
            [attr.aria-invalid]="hasError('email')"
            [attr.aria-describedby]="hasError('email') ? 'login-email-error' : null">
        </app-form-field>

        <app-form-field label="Contraseña" fieldId="login-password" [hasError]="hasError('password')" [errorMessage]="hasError('password') ? getError('password') : ''">
          <input id="login-password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
            maxlength="100"
            [appAutofocus]="focusPassword"
            [attr.aria-invalid]="hasError('password')"
            [attr.aria-describedby]="hasError('password') ? 'login-password-error' : null">
        </app-form-field>

        <nav class="login__options" aria-label="Opciones de sesión">
          <label class="login__remember">
            <input type="checkbox" formControlName="rememberMe">
            Recordarme
          </label>
        </nav>

        <footer class="login__submit">
          <button type="submit"
            class="button button--primary button--full-width"
            [disabled]="loading"
            [attr.aria-busy]="loading">
            Entrar
          </button>
        </footer>

        <a class="login__register" routerLink="/register">¿No tienes cuenta? Solicítala</a>
      </form>

      <p class="login__legal">
        Información protegida. Acceso restringido a miembros.
      </p>
    </section>
  </article>
</section>
