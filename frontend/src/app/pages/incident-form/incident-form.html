<section class="container section">
  <h1>Nueva incidencia</h1>

  @if (errorMessage) {
    <app-banner type="critical">{{ errorMessage }}</app-banner>
  }

  @if (successMessage) {
    <app-banner type="info">{{ successMessage }}</app-banner>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
    <app-form-field label="Descripción *" fieldId="incident-description" [hasError]="hasError('description')" [errorMessage]="hasError('description') ? getError('description') : ''">
      <textarea id="incident-description" formControlName="description" rows="4"></textarea>
    </app-form-field>

    <app-form-field label="Reportado por" fieldId="incident-reporter">
      <select id="incident-reporter" formControlName="reportedById">
        <option [ngValue]="null">Sin asignar</option>
        @for (user of users; track user.id) {
          <option [ngValue]="user.id">{{ user.fullName }}</option>
        }
      </select>
    </app-form-field>

    <footer class="form__actions">
      <button type="submit" class="button button--primary" [disabled]="loading">
        Registrar incidencia
      </button>
      <button type="button" class="button button--secondary" (click)="goBack()">
        Cancelar
      </button>
    </footer>
  </form>
</section>
