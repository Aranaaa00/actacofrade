<section class="container section">
  <h1>{{ isEditMode ? 'Editar decisión' : 'Nueva decisión' }}</h1>

  @if (errorMessage) {
    <app-banner type="critical">{{ errorMessage }}</app-banner>
  }

  @if (successMessage) {
    <app-banner type="info">{{ successMessage }}</app-banner>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
    <app-form-field label="Área *" fieldId="decision-area" [hasError]="hasError('area')" [errorMessage]="hasError('area') ? getError('area') : ''">
      <select id="decision-area" formControlName="area">
        <option value="" disabled>Selecciona un área</option>
        <option value="CULTOS">Cultos</option>
        <option value="FORMACION">Formación</option>
        <option value="PATRIMONIO">Patrimonio</option>
        <option value="CARIDAD">Caridad</option>
        <option value="ECONOMIA">Economía</option>
        <option value="GENERAL">General</option>
      </select>
    </app-form-field>

    <app-form-field label="Título *" fieldId="decision-title" [hasError]="hasError('title')" [errorMessage]="hasError('title') ? getError('title') : ''">
      <input id="decision-title" type="text" formControlName="title">
    </app-form-field>

    <app-form-field label="Revisado por" fieldId="decision-reviewer">
      <select id="decision-reviewer" formControlName="reviewedById">
        <option [ngValue]="null">Sin asignar</option>
        @for (user of users; track user.id) {
          <option [ngValue]="user.id">{{ user.fullName }}</option>
        }
      </select>
    </app-form-field>

    <footer class="form__actions">
      <button type="submit" class="button button--primary" [disabled]="loading">
        {{ isEditMode ? 'Guardar cambios' : 'Crear decisión' }}
      </button>
      <button type="button" class="button button--secondary" (click)="goBack()">
        Cancelar
      </button>
    </footer>
  </form>
</section>
