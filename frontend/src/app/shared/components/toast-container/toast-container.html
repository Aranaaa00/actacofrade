<section class="toast__container" role="region" aria-label="Notificaciones" aria-live="polite">
  @for (toast of toasts(); track toast.id) {
    <article
      class="toast"
      [class.toast--success]="toast.tone === 'success'"
      [class.toast--error]="toast.tone === 'error'"
      [class.toast--warning]="toast.tone === 'warning'"
      [class.toast--info]="toast.tone === 'info'"
      [class.toast--leaving]="toast.leaving"
      [attr.role]="ariaRole(toast.tone)"
      [attr.aria-live]="ariaLive(toast.tone)"
      aria-atomic="true">
      <section class="toast__parchment">
        <p class="toast__content">
          <span class="toast__indicator" aria-hidden="true"></span>
          <span class="toast__message">{{ toast.message }}</span>
          <button
            type="button"
            class="toast__close"
            (click)="dismiss(toast.id)"
            aria-label="Cerrar notificación">
            <span aria-hidden="true">×</span>
          </button>
        </p>
      </section>
    </article>
  }
</section>
