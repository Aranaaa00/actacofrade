<div class="toasts" aria-label="Notificaciones">
  @for (toast of toasts(); track toast.id) {
    <article
      class="toast"
      [class.toast--success]="toast.tone === 'success'"
      [class.toast--error]="toast.tone === 'error'"
      [class.toast--warning]="toast.tone === 'warning'"
      [class.toast--info]="toast.tone === 'info'"
      [class.toast--leaving]="toast.leaving"
      [attr.role]="ariaRole(toast.tone)"
      [attr.aria-live]="ariaLive(toast.tone)"
      aria-atomic="true">
      <span class="toast__edge toast__edge--left" aria-hidden="true"></span>
      <div class="toast__sheet">
        <p class="toast__message">{{ toast.message }}</p>
        <button
          type="button"
          class="toast__close"
          (click)="dismiss(toast.id)"
          aria-label="Cerrar notificación">
          <span aria-hidden="true">×</span>
        </button>
      </div>
      <span class="toast__edge toast__edge--right" aria-hidden="true"></span>
    </article>
  }
</div>
