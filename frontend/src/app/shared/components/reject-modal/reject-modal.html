@if (show) {
  <section class="modal-overlay" appModalA11y role="presentation" (click)="onCancel()" (keydown.escape)="onCancel()">
    <article class="modal" (click)="$event.stopPropagation()" role="dialog" aria-modal="true" aria-labelledby="rejectModalTitle">
      <header class="modal__header">
        <h2 id="rejectModalTitle" class="modal__title">Rechazar tarea</h2>
        <button class="modal__close" type="button" (click)="onCancel()" aria-label="Cerrar">
          <lucide-icon name="x" [size]="20" aria-hidden="true"></lucide-icon>
        </button>
      </header>
      <section class="modal__body">
        <fieldset class="form-field" [class.form-field--error]="submitted && !reason.trim()">
          <label class="form-field__label" for="rejectionReason">Motivo</label>
          <textarea id="rejectionReason" class="input" rows="3"
            [(ngModel)]="reason"
            maxlength="500"
            [attr.aria-invalid]="submitted && !reason.trim() ? 'true' : null"
            [attr.aria-describedby]="submitted && !reason.trim() ? 'rejectionReason-error' : null"
            placeholder="Indica el motivo del rechazo…"></textarea>
          @if (submitted && !reason.trim()) {
            <small id="rejectionReason-error" class="form-field__error" role="alert">El motivo es obligatorio</small>
          }
        </fieldset>
      </section>
      <footer class="modal__footer">
        <button class="button button--secondary" type="button" (click)="onCancel()">Cancelar</button>
        <button class="button button--danger" type="button"
          [disabled]="processing"
          (click)="onConfirm()">Rechazar</button>
      </footer>
    </article>
  </section>
}
