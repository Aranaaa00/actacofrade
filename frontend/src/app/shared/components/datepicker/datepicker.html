<section class="datepicker" [class.datepicker--open]="open">
  <button class="datepicker__trigger" type="button" (click)="toggle()" aria-label="Seleccionar fecha">
    <lucide-icon name="calendar" [size]="16" aria-hidden="true"></lucide-icon>
    <span class="datepicker__value">{{ displayValue }}</span>
    <lucide-icon name="chevron-down" [size]="14" aria-hidden="true"></lucide-icon>
  </button>

  @if (open) {
    <article class="datepicker__panel" role="dialog" aria-label="Calendario">
      <header class="datepicker__header">
        <button class="datepicker__arrow" type="button" (click)="prevMonth()" [disabled]="!canGoPrev" aria-label="Mes anterior">
          <lucide-icon name="chevron-left" [size]="16" aria-hidden="true"></lucide-icon>
        </button>
        <span class="datepicker__month">{{ monthLabel }}</span>
        <button class="datepicker__arrow" type="button" (click)="nextMonth()" aria-label="Mes siguiente">
          <lucide-icon name="chevron-right" [size]="16" aria-hidden="true"></lucide-icon>
        </button>
      </header>

      <table class="datepicker__grid" role="grid">
        <thead>
          <tr>
            @for (day of weekDays; track day) {
              <th class="datepicker__weekday" scope="col">{{ day }}</th>
            }
          </tr>
        </thead>
        <tbody>
          @for (week of weeks; track $index) {
            <tr>
              @for (cell of week; track $index) {
                <td>
                  @if (cell) {
                    <button
                      class="datepicker__day"
                      [class.datepicker__day--available]="isAvailable(cell)"
                      [class.datepicker__day--selected]="isSelected(cell)"
                      [disabled]="!isAvailable(cell)"
                      type="button"
                      (click)="selectDate(cell)">
                      {{ cell }}
                    </button>
                  }
                </td>
              }
            </tr>
          }
        </tbody>
      </table>
    </article>
  }
</section>
