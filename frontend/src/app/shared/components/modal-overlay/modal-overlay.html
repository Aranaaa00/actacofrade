<section class="modal-overlay"
  appModalA11y
  role="dialog"
  aria-modal="true"
  [attr.aria-labelledby]="titleId"
  (click)="onOverlayClick($event)"
  (keydown.escape)="closed.emit()">

  <article [class]="'modal' + (modalClass ? ' ' + modalClass : '')">
    <header [class]="headerClass">
      <ng-content select="[modalTitle]" />
      <button class="modal__close" type="button" (click)="closed.emit()" aria-label="Cerrar">
        <lucide-icon name="x" [size]="24" aria-hidden="true"></lucide-icon>
      </button>
    </header>

    <ng-content />
  </article>
</section>
