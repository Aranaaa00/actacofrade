@if (show && user) {
  <aside class="modal-overlay" appModalA11y role="presentation" (click)="onCancel()" (keydown.escape)="onCancel()">
    <article class="modal" role="dialog" aria-modal="true" aria-labelledby="editUserTitle" (click)="$event.stopPropagation()">
      <header class="modal__header">
        <h2 id="editUserTitle" class="modal__title">Editar usuario</h2>
        <button class="modal__close" type="button" (click)="onCancel()" aria-label="Cerrar">
          <lucide-icon name="x" [size]="20" aria-hidden="true"></lucide-icon>
        </button>
      </header>
      <section class="modal__body">
        <p class="edit-user__user">
          <strong>{{ user.fullName }}</strong>
          <small>{{ user.email }}</small>
        </p>
        <fieldset class="form-field">
          <label class="form-field__label" for="editUserRole">Rol</label>
          <select id="editUserRole" class="input" [(ngModel)]="selectedRole" name="role">
            @for (role of roles; track role.value) {
              <option [value]="role.value">{{ role.label }}</option>
            }
          </select>
        </fieldset>
      </section>
      <footer class="modal__footer">
        <button class="button button--secondary" type="button" (click)="onCancel()">Cancelar</button>
        <button class="button button--primary" type="button"
          [disabled]="processing || !selectedRole"
          (click)="onConfirm()">Guardar</button>
      </footer>
    </article>
  </aside>
}
