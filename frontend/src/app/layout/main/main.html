<section class="app-shell">
  <app-sidebar
    [open]="sidebarOpen"
    [user]="user"
    [userInitials]="userInitials"
    (closed)="closeSidebar()"
    (loggedOut)="logout()"
    (profileEditRequested)="openProfile()" />

  <section class="app-shell__main">
    <app-header
      [sidebarOpen]="sidebarOpen"
      [user]="user"
      (toggledSidebar)="toggleSidebar()" />

    <main class="app-shell__content">
      <router-outlet />
    </main>
  </section>

  <app-profile-modal
    [show]="profileModalOpen()"
    [user]="user"
    (closed)="closeProfile()"
    (updated)="onProfileUpdated($event)" />
</section>
