upstream actacofrade_backend {
    server backend:8080;
    keepalive 32;
}

# Rate-limit zone for authentication endpoints (login / register / reset).
# 10 req/min per client IP with a small burst to absorb legitimate retries.
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;              
    client_max_body_size 4m;           
    client_body_timeout 15s;
    client_header_timeout 15s;

    add_header X-Frame-Options          "DENY"                              always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin"                   always;
    add_header Cross-Origin-Resource-Policy "same-origin"                   always;
    # CSP tuned for the Angular SPA: scripts and connections same-origin,
    # inline styles allowed (component-scoped styles emitted at build time),
    # base-uri locked, no framing, no eval.
    add_header Content-Security-Policy  "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; object-src 'none'" always;

    proxy_http_version 1.1;
    proxy_set_header Connection        "";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    proxy_buffering on;
    proxy_buffers     16 16k;
    proxy_buffer_size 32k;

    # Strip duplicates: the backend (Spring Security) already emits some of
    # the same security headers we add at the edge. Hiding them upstream
    # prevents duplicated values in proxied responses.
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-XSS-Protection;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://actacofrade_backend;
    }

    # Stricter limit for authentication-related endpoints to slow down brute force.
    location /api/auth/ {
        limit_req zone=auth_zone burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://actacofrade_backend;
    }

    # OpenAPI JSON document.
    location /v3/api-docs {
        proxy_pass http://actacofrade_backend;
    }

    # Swagger UI assets and entry point.
    location /swagger-ui {
        proxy_pass http://actacofrade_backend;
    }
    location = /swagger-ui.html {
        proxy_pass http://actacofrade_backend;
    }

    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp|avif|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # Only the SPA route falls back to index.html on upstream failure.
        # /api/, /swagger-ui and /v3/api-docs keep their genuine error status
        # so clients receive JSON/HTTP errors instead of an HTML SPA payload.
        error_page 500 502 503 504 /index.html;
    }
}