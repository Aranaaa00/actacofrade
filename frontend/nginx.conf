upstream actacofrade_backend {
    server backend:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;              
    client_max_body_size 4m;           
    client_body_timeout 15s;
    client_header_timeout 15s;

    add_header X-Frame-Options          "DENY"                              always;
    add_header X-Content-Type-Options   "nosniff"                           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin"                   always;
    add_header Cross-Origin-Resource-Policy "same-origin"                   always;

    proxy_http_version 1.1;
    proxy_set_header Connection        "";
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Port  $server_port;

    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    proxy_buffering on;
    proxy_buffers     16 16k;
    proxy_buffer_size 32k;

    # Strip duplicates: the backend (Spring Security) already emits some of
    # the same security headers we add at the edge. Hiding them upstream
    # prevents duplicated values in proxied responses.
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-XSS-Protection;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/manifest+json
        image/svg+xml
        font/ttf
        font/otf;

    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://actacofrade_backend;
    }

    # OpenAPI JSON document.
    location /v3/api-docs {
        proxy_pass http://actacofrade_backend;
    }

    # Swagger UI assets and entry point.
    location /swagger-ui {
        proxy_pass http://actacofrade_backend;
    }
    location = /swagger-ui.html {
        proxy_pass http://actacofrade_backend;
    }

    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp|avif|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /index.html;
}