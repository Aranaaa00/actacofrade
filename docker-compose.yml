version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: actacofrade_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - actacofrade_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: actacofrade_backend
    ports:
      - "8080:8080" # Puerto de la API para que Angular lo consuma
    environment:
      # Sobreescribe las variables de entorno para usar el contenedor de base de datos
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      - db
    networks:
      - actacofrade_network
    restart: unless-stopped

networks:
  actacofrade_network:
    driver: bridge

volumes:
  postgres_data:
    name: actacofrade_pg_data # Persistencia de la base de datos
