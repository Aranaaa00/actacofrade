name: actacofrade

services:
  db:
    image: postgres:15-alpine
    container_name: actacofrade_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # No `ports:` — the database is reachable only from the backend
    # through the internal Docker network.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - actacofrade_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: actacofrade_backend
    # No `ports:` — the backend is reachable only via the nginx reverse proxy
    # in the `frontend` service (paths /api, /swagger-ui, /v3/api-docs).
    expose:
      - "8080"
    environment:
      # Override env vars to use the database container
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      AVATAR_MAX_SIZE: ${AVATAR_MAX_SIZE}
      AVATAR_MAX_BYTES: ${AVATAR_MAX_BYTES}
      AVATAR_ALLOWED_TYPES: ${AVATAR_ALLOWED_TYPES}
      # Super admin credentials (created on first start if missing)
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      SUPERADMIN_FULL_NAME: ${SUPERADMIN_FULL_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - actacofrade_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: actacofrade_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - actacofrade_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 -O /dev/null http://127.0.0.1:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  actacofrade_network:
    driver: bridge

volumes:
  postgres_data:
    name: actacofrade_pg_data # Database persistence
