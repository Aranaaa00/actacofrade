spring.application.name=backend

# PostgreSQL Connection
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/actacofrade}
spring.datasource.username=${DB_USER:actacofrade_user}
spring.datasource.password=${DB_PASSWORD:actacofrade_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false

# JWT Configuration
jwt.secret=${JWT_SECRET:clave-secreta-desarrollo-local-actacofrade-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS (development override: http://localhost:4200)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Logging
logging.level.org.flywaydb=INFO
logging.level.com.actacofrade=INFO
logging.level.org.springframework.security=WARN
