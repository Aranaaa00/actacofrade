spring.application.name=backend

# PostgreSQL Connection
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/actacofrade}
spring.datasource.username=${DB_USER:actacofrade_user}
spring.datasource.password=${DB_PASSWORD:actacofrade_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false

# JWT Configuration
jwt.secret=${JWT_SECRET:clave-secreta-desarrollo-local-actacofrade-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Flyway Logging (debug)
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
